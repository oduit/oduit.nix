name: CI

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    env:
      NIXPKGS_ALLOW_UNFREE: 1
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            extra-experimental-features = nix-command flakes
            accept-flake-config = true
      - name: Run nix flake check
        run: |
          nix flake check \
            --accept-flake-config \
            --show-trace \
            --keep-going \
            --print-build-logs

  package-list:
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.list-packages.outputs.packages }}
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            extra-experimental-features = nix-command flakes
            accept-flake-config = true
      - id: list-packages
        name: List flake packages
        run: echo "packages=$(nix eval --json .#packages.x86_64-linux --apply builtins.attrNames)" >> "$GITHUB_OUTPUT"

  build-packages:
    needs:
      - checks
      - package-list
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJson(needs.package-list.outputs.packages) }}
    runs-on: ubuntu-latest
    env:
      NIXPKGS_ALLOW_UNFREE: 1
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            extra-experimental-features = nix-command flakes
            accept-flake-config = true
      - name: Build package ${{ matrix.package }}
        run: nix build --accept-flake-config --print-build-logs --show-trace .#${{ matrix.package }}
